name: Feature Request
description: Suggest a new feature for NORA
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like it to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've thought about
  - type: dropdown
    id: registry
    attributes:
      label: Related Registry
      options:
        - Docker/OCI
        - npm
        - Maven
        - PyPI
        - Cargo
        - Go
        - Raw
        - UI/Dashboard
        - Core/General
